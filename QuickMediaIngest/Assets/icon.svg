<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!--
    Quick Media Ingest – App Icon (source)
    256×256 reference units.  Edit this SVG then re-run create_icon.ps1.

    Design language:
      • Near-black background (#0d1117) — high contrast base
      • White SD-card silhouette — instantly communicates "media storage"
      • Bold electric-cyan (#00d4ff) downward arrow going INTO the card — "ingest / import"
      • Classic SD-card chamfer on top-right corner + 4 connector slots
  -->

  <!-- ── Background ── -->
  <rect width="256" height="256" rx="40" ry="40" fill="#0d1117"/>

  <!-- ── SD card body (chamfered top-right) ── -->
  <polygon
    points="73,68 150,68 183,98 183,213 73,213"
    fill="#e2e8f0"/>

  <!-- ── Connector slots (4 vertical cuts at card base) ── -->
  <rect x="85"  y="192" width="14" height="21" rx="2" fill="#0d1117"/>
  <rect x="109" y="192" width="14" height="21" rx="2" fill="#0d1117"/>
  <rect x="133" y="192" width="14" height="21" rx="2" fill="#0d1117"/>
  <rect x="157" y="192" width="14" height="21" rx="2" fill="#0d1117"/>

  <!-- ── Import arrow (bold, solid, descends into card) ── -->
  <!--   Shaft: 108-148 wide, 20→115 tall                 -->
  <!--   Head widens to 86-170, tip at (128,163)           -->
  <polygon
    points="108,20 148,20 148,115 170,115 128,163 86,115 108,115"
    fill="#00d4ff"/>
</svg>
