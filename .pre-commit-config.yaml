repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: file-encoding
        name: Check UTF-8 file encoding
        entry: bash scripts/check-file-encoding.sh
        language: system
        pass_filenames: true
        files: \.(md|json|yml|yaml|sh|ps1|mdc)$
      - id: file-limits
        name: Check WPF file line limits
        entry: bash scripts/check-file-limits.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: license-compliance
        name: Check license compliance
        entry: bash scripts/check-license-compliance.sh
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
