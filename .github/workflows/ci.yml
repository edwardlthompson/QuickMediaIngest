name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  encoding-check:
    name: File Encoding (UTF-8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check text files are UTF-8
        run: bash scripts/check-file-encoding.sh

  file-limits:
    name: File Size Budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check WPF file line limits
        run: bash scripts/check-file-limits.sh

  validate-index:
    name: Validate Template Index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate TEMPLATE_INDEX.json paths
        run: bash scripts/validate-template-index.sh

  validate-bootstrap:
    name: Validate Bootstrap Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Sprint 0 artifacts exist
        run: bash scripts/validate-bootstrap.sh --quick

  batch-commands:
    name: Batch Commands Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify slash command files match registry
        run: bash scripts/check-batch-commands.sh

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check tracked artifacts and gitignore
        run: bash scripts/check-repo-hygiene.sh

  dotnet:
    name: .NET — Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.422"
          global-json-file: global.json
      - name: Restore
        run: dotnet restore QuickMediaIngest-1.sln
      - name: Build
        run: dotnet build QuickMediaIngest-1.sln -c Release --no-restore
      - name: Test
        run: dotnet test QuickMediaIngest-1.sln -c Release --no-build --verbosity normal
      - name: Headless libvips smoke (published exe)
        shell: pwsh
        run: |
          dotnet publish QuickMediaIngest/QuickMediaIngest.csproj -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish/ci-smoke
          & ./publish/ci-smoke/QuickMediaIngest.exe --smoke-libvips
          if ($LASTEXITCODE -ne 0) { throw "libvips smoke failed with exit code $LASTEXITCODE" }
      - name: Vulnerable packages
        run: dotnet list QuickMediaIngest-1.sln package --vulnerable --include-transitive
      - name: License compliance
        run: bash scripts/check-license-compliance.sh
      - name: Format check
        run: dotnet format QuickMediaIngest-1.sln --verify-no-changes

  template-update-check:
    name: Template Update Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Check for upstream template updates
        run: bash scripts/check-template-updates.sh --verbose

  human-signoffs:
    name: Human Sign-offs (automated)
    runs-on: windows-latest
    needs: dotnet
    permissions:
      contents: read
      security-events: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.422"
          global-json-file: global.json
      - name: Automated human sign-off suite
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/run-human-signoffs.sh --strict --skip-security
      - name: Security triage (Dependabot + CI snapshot)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/check-security-triage.sh --strict --wait-ci 300

  human-verification-smoke:
    name: Human Verification Smoke (optional LAN FTP)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.422"
          global-json-file: global.json
      - name: Config + optional FTP smoke tests
        shell: bash
        run: bash scripts/smoke-human-verification.sh --no-security
