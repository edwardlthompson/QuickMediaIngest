name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore QuickMediaIngest/QuickMediaIngest/QuickMediaIngest.csproj

    - name: Build and Publish Portable EXE
      run: |
        dotnet publish QuickMediaIngest/QuickMediaIngest/QuickMediaIngest.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/portable

    - name: Zip Portable Version
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/portable/* -DestinationPath ./publish/QuickMediaIngest-Portable.zip

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./publish/QuickMediaIngest-Portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
