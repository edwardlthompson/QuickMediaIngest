name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Version from Project
      shell: pwsh
      run: |
        $csproj = "QuickMediaIngest/QuickMediaIngest.csproj"
        $version = (Select-String -Path $csproj -Pattern '<Version>(.*)</Version>').Matches.Value -replace '<Version>|</Version>', ''
        if (-not $version) { $version = "1.0.0" }
        echo "Updating GitHub Env with Version: $version"
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Determine Release Status
      shell: pwsh
      run: |
        $tag = "v${{ env.VERSION }}"
        git fetch --tags --force
        $existingTag = git tag -l $tag
        $tagExists = -not [string]::IsNullOrWhiteSpace($existingTag)

        # Check whether a GitHub Release already exists for this tag.
        gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
        $releaseExists = $LASTEXITCODE -eq 0

        $shouldCreateTag = -not $tagExists
        $shouldCreateRelease = -not $releaseExists

        echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
        echo "SHOULD_CREATE_TAG=$($shouldCreateTag.ToString().ToLower())" >> $env:GITHUB_ENV
        echo "SHOULD_CREATE_RELEASE=$($shouldCreateRelease.ToString().ToLower())" >> $env:GITHUB_ENV

        if (-not $tagExists -and -not $releaseExists) {
          Write-Host "No existing tag or release found for $tag. Tag and release will be created."
        }
        elseif ($tagExists -and -not $releaseExists) {
          Write-Host "Tag $tag exists but release is missing. A release will be created."
        }
        elseif ($tagExists -and $releaseExists) {
          Write-Host "Tag and release for $tag already exist. Release creation will be skipped."
        }
        else {
          Write-Host "Release for $tag already exists. Tag will be created and release step skipped."
        }

    - name: Restore Dependencies
      run: dotnet restore QuickMediaIngest/QuickMediaIngest.csproj

    - name: Build and Publish Portable EXE
      run: |
        dotnet publish QuickMediaIngest/QuickMediaIngest.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ env.VERSION }} -o ./publish/portable

    - name: Zip Portable Version
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/portable/* -DestinationPath ./publish/QuickMediaIngest-Portable.zip

    - name: Install WiX Toolset
      run: dotnet tool install --global wix --version 4.0.4

    - name: Add WiX UI Extension
      run: wix extension add --global WixToolset.UI.wixext/4.0.4

    - name: Build MSI Installer
      run: |
        wix build Installer/QuickMediaIngest.wxs -ext WixToolset.UI.wixext -d Version=${{ env.VERSION }} -o ./publish/QuickMediaIngest.msi

    - name: Create and Push Version Tag
      if: env.SHOULD_CREATE_TAG == 'true'
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag ${{ env.RELEASE_TAG }}
        git push origin ${{ env.RELEASE_TAG }}

    - name: Upload Build Artifacts
      if: env.SHOULD_CREATE_RELEASE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: QuickMediaIngest-Build-${{ env.VERSION }}
        path: |
          ./publish/QuickMediaIngest-Portable.zip
          ./publish/QuickMediaIngest.msi

    - name: Create Release
      if: env.SHOULD_CREATE_RELEASE == 'true'
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Release ${{ env.RELEASE_TAG }}
        files: |
          ./publish/QuickMediaIngest-Portable.zip
          ./publish/QuickMediaIngest.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
