name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Version from Project
      shell: pwsh
      run: |
        $csproj = "QuickMediaIngest/QuickMediaIngest.csproj"
        $version = (Select-String -Path $csproj -Pattern '<Version>(.*)</Version>').Matches.Value -replace '<Version>|</Version>', ''
        if (-not $version) { $version = "1.0.0" }
        echo "Updating GitHub Env with Version: $version"
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Determine Release Tag
      shell: pwsh
      run: |
        $tag = "v${{ env.VERSION }}"
        git fetch --tags --force
        $existingTag = git tag -l $tag
        $tagExists = -not [string]::IsNullOrWhiteSpace($existingTag)
        $shouldCreateTag = -not $tagExists

        echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
        echo "SHOULD_CREATE_TAG=$($shouldCreateTag.ToString().ToLower())" >> $env:GITHUB_ENV

        if ($shouldCreateTag) {
          Write-Host "No existing tag found for $tag. Tag will be created."
        }
        else {
          Write-Host "Tag $tag already exists."
        }

    - name: Restore Dependencies
      run: dotnet restore QuickMediaIngest/QuickMediaIngest.csproj

    - name: Build and Publish Portable EXE
      run: |
        dotnet publish QuickMediaIngest/QuickMediaIngest.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:PublishReadyToRun=true /p:Version=${{ env.VERSION }} -o ./publish/portable

    - name: Zip Portable Version
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/portable/* -DestinationPath ./publish/QuickMediaIngest-Portable.zip

    - name: Install WiX Toolset
      run: dotnet tool install --global wix --version 4.0.4

    - name: Add WiX UI Extension
      run: wix extension add --global WixToolset.UI.wixext/4.0.4

    - name: Build MSI Installer
      run: |
        wix build Installer/QuickMediaIngest.wxs -ext WixToolset.UI.wixext -d Version=${{ env.VERSION }} -o ./publish/QuickMediaIngest.msi

    - name: Create and Push Version Tag
      if: env.SHOULD_CREATE_TAG == 'true'
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag ${{ env.RELEASE_TAG }}
        git push origin ${{ env.RELEASE_TAG }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: QuickMediaIngest-Build-${{ env.VERSION }}
        path: |
          ./publish/QuickMediaIngest-Portable.zip
          ./publish/QuickMediaIngest.msi

    - name: Ensure Release Exists
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ env.RELEASE_TAG }}"
        $repo = "$env:GITHUB_REPOSITORY"

        $ErrorActionPreference = "Continue"
        $PSNativeCommandUseErrorActionPreference = $false

        gh release view $tag --repo $repo *> $null
        if ($LASTEXITCODE -ne 0) {
          gh release create $tag --repo $repo --title "Release $tag" --notes "Automated release for $tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create release for $tag"
          }
        }

    - name: Upload Release Assets
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ env.RELEASE_TAG }}"
        $repo = "$env:GITHUB_REPOSITORY"

        gh release upload $tag ./publish/QuickMediaIngest-Portable.zip ./publish/QuickMediaIngest.msi --repo $repo --clobber
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to upload release assets for $tag"
        }
